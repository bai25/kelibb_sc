name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }
    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with: { python-version: '3.9' }
    - name: Install deps
      run: sudo apt-get install -y xvfb

    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with: { path: renpy-sdk, key: renpy-8.3.7-full }

    - name: Download SDK & RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        wget -q $BASE/renpy-8.3.7-rapt.zip
        rm -rf renpy-sdk  # 清除 repo 自带的 rapt/ 占位，避免 mv 失败
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk
        unzip -q -o renpy-8.3.7-rapt.zip -d renpy-sdk 2>/dev/null
        # 拉平 rapt/rapt/
        if [ -d renpy-sdk/rapt/rapt ]; then
          cp -r renpy-sdk/rapt/rapt/* renpy-sdk/rapt/ 2>/dev/null || true
        fi

    - name: Compile game
      run: xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile

    - name: Prepare assets & build files
      run: |
        python3 .github/workflows/prepare_rapt.py
        # 把仓库里的构建配置复制到 SDK 的 prototype
        for dir in prototype project; do
          DST=renpy-sdk/rapt/$dir
          [ ! -d "$DST" ] && continue
          cp android/build.gradle "$DST/"
          cp android/settings.gradle "$DST/"
          cp android/gradle.properties "$DST/" 2>/dev/null || true
          cp android/gradlew "$DST/" 2>/dev/null || true
          cp android/gradlew.bat "$DST/" 2>/dev/null || true
          # app module
          mkdir -p "$DST/app"
          cp android/app/build.gradle "$DST/app/"
          # ff modules
          for ff in ff1 ff2 ff3 ff4; do
            cp android/$ff/build.gradle "$DST/$ff/" 2>/dev/null || true
          done
          # renpyandroid + renpyiap
          for mod in renpyandroid renpyiap; do
            cp android/$mod/build.gradle "$DST/$mod/"
            cp -r android/$mod/src "$DST/$mod/" 2>/dev/null || true
          done
          # app 模块的生成文件
          cp -r android/app/src "$DST/app/" 2>/dev/null || true
        done

    - name: Sync assets from project to prototype
      run: |
        # prepare_rapt.py 把素材放到 project/，但构建从 prototype/ 跑
        if [ -d renpy-sdk/rapt/project/app/src/main/assets ]; then
          rm -rf renpy-sdk/rapt/prototype/app/src/main/assets
          cp -r renpy-sdk/rapt/project/app/src/main/assets renpy-sdk/rapt/prototype/app/src/main/assets
          echo "📦 Synced $(find renpy-sdk/rapt/prototype/app/src/main/assets -type f | wc -l) asset files"
        fi

    - name: Build APK
      run: |
        cd renpy-sdk/rapt/prototype
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/rapt/prototype/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
