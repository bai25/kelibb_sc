name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }
    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with: { python-version: '3.9' }
    - name: Install deps
      run: sudo apt-get install -y xvfb

    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with: { path: renpy-sdk, key: renpy-8.3.7-full }

    - name: Download SDK & RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        wget -q $BASE/renpy-8.3.7-rapt.zip
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk
        unzip -q -o renpy-8.3.7-rapt.zip -d renpy-sdk 2>/dev/null
        # 拉平 rapt/rapt/
        if [ -d renpy-sdk/rapt/rapt ]; then
          cp -r renpy-sdk/rapt/rapt/* renpy-sdk/rapt/ 2>/dev/null || true
        fi

    - name: Compile game
      run: xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile

    - name: Prepare assets & build files
      run: |
        python3 .github/workflows/prepare_rapt.py
        # 把仓库里的构建配置复制到 SDK 的 prototype 和 project
        cp android/build.gradle renpy-sdk/rapt/prototype/
        cp android/settings.gradle renpy-sdk/rapt/prototype/ 2>/dev/null || true
        cp android/gradle.properties renpy-sdk/rapt/prototype/
        mkdir -p renpy-sdk/rapt/prototype/app
        cp android/app/build.gradle renpy-sdk/rapt/prototype/app/ 2>/dev/null || true
        # 同步到 project
        if [ -d renpy-sdk/rapt/project ]; then
          cp android/build.gradle renpy-sdk/rapt/project/
          cp android/settings.gradle renpy-sdk/rapt/project/ 2>/dev/null || true
          cp android/gradle.properties renpy-sdk/rapt/project/
          mkdir -p renpy-sdk/rapt/project/app
          cp android/app/build.gradle renpy-sdk/rapt/project/app/ 2>/dev/null || true
        fi

    - name: Build APK
      run: |
        cd renpy-sdk/rapt/prototype
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/rapt/prototype/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
