name: Android CI
on:
  push:
    branches: ["main"]
    paths:
      - "game/**"
      - "android.json"
      - "android-presplash.jpg"
      - "android-icon_background.png"
      - "android-icon_foreground.png"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with: { java-version: '21', distribution: 'temurin' }

    # ---- Ren'Py SDK (cached, 不变) ----
    - name: Cache SDK
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: /opt/renpy-sdk
        key: renpy-8.3.7-sdk-v3

    - name: Download SDK + RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        mkdir -p /opt/renpy-sdk
        cd /opt/renpy-sdk
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk/* .
        rm -rf renpy-8.3.7-sdk renpy-8.3.7-sdk.tar.bz2
        wget -q $BASE/renpy-8.3.7-rapt.zip
        unzip -q -o renpy-8.3.7-rapt.zip
        rm -f renpy-8.3.7-rapt.zip
        if [ -d rapt/rapt ]; then
          cp -r rapt/rapt/* rapt/
          rm -rf rapt/rapt
        fi
        rm -rf rapt/Sdk 2>/dev/null || true

    # ---- 双架构 ----
    - name: Patch RAPT — dual architecture
      run: |
        sed -i "s/abiFilters 'arm64-v8a'/abiFilters 'arm64-v8a', 'armeabi-v7a'/" \
          /opt/renpy-sdk/rapt/templates/app-build.gradle

    # ---- 永久 keystore: 从 GitHub Secret 解码，保证每次签名一致 ----
    - name: Decode keystore from secret
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/android.keystore
        echo "✅ Keystore decoded from secret"

    - name: Point to system Android SDK
      run: |
        echo "/usr/local/lib/android/sdk" > /opt/renpy-sdk/rapt/sdk.txt
        echo "SDK at: $(cat /opt/renpy-sdk/rapt/sdk.txt)"

    - name: Build APK
      run: |
        cd /opt/renpy-sdk
        xvfb-run -a ./renpy.sh launcher android_build "$GITHUB_WORKSPACE" 2>&1
        mkdir -p $GITHUB_WORKSPACE/apk-output
        cd /opt/renpy-sdk
        UNIVERSAL=$(ls -S rapt/bin/*.apk 2>/dev/null | head -1)
        if [ -n "$UNIVERSAL" ]; then
          cp "$UNIVERSAL" $GITHUB_WORKSPACE/apk-output/可堡灵之校-0.1-alpha.apk
          echo "✅ APK: $(basename $UNIVERSAL)"
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: apk-output/*.apk
        if-no-files-found: error
