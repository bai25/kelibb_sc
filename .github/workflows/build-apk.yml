name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }

    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-sdk
        key: renpy-8.3.7-compile-v1

    - name: Download Ren'Py SDK
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        wget -q https://github.com/renpy/renpy/releases/download/8.3.7.25031702/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk

    - name: Compile game scripts
      run: |
        xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile 2>&1
        echo "✅ Scripts compiled"

    - name: Prepare assets + build files
      run: |
        # 1. 准备 Android assets（prepare_rapt.py 生成）
        python3 $GITHUB_WORKSPACE/.github/workflows/prepare_rapt.py

        # 2. 复制 repo 中的 Gradle 构建配置
        #    构建目录使用 prototype/
        mkdir -p renpy-sdk/rapt/prototype/app/src/main
        cp -r $GITHUB_WORKSPACE/android/build.gradle renpy-sdk/rapt/prototype/
        cp -r $GITHUB_WORKSPACE/android/settings.gradle renpy-sdk/rapt/prototype/
        cp -r $GITHUB_WORKSPACE/android/gradle.properties renpy-sdk/rapt/prototype/
        cp -r $GITHUB_WORKSPACE/android/gradlew renpy-sdk/rapt/prototype/
        cp -r $GITHUB_WORKSPACE/android/gradlew.bat renpy-sdk/rapt/prototype/ 2>/dev/null || true
        cp -r $GITHUB_WORKSPACE/android/app/build.gradle renpy-sdk/rapt/prototype/app/
        # 复制 AndroidManifest.xml
        mkdir -p renpy-sdk/rapt/prototype/app/src/main/res/values
        cp -r $GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml renpy-sdk/rapt/prototype/app/src/main/
        # 复制源模块
        for mod in renpyandroid renpyiap; do
          cp -r $GITHUB_WORKSPACE/android/$mod/build.gradle renpy-sdk/rapt/prototype/$mod/
          cp -r $GITHUB_WORKSPACE/android/$mod/src renpy-sdk/rapt/prototype/$mod/ 2>/dev/null || true
        done

        # 3. 移动 assets 到 prototype（prepare_rapt 写入到 project/）
        if [ -d renpy-sdk/rapt/project/app/src/main/assets ]; then
          rm -rf renpy-sdk/rapt/prototype/app/src/main/assets
          cp -r renpy-sdk/rapt/project/app/src/main/assets renpy-sdk/rapt/prototype/app/src/main/assets
        fi

        echo "✅ Assets + build files ready"

    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore renpy-sdk/rapt/prototype/debug.keystore \
          -alias android -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=CI, OU=Build, O=Goblin, L=Beijing, ST=Beijing, C=CN"
        # 写入 local.properties 让 Gradle 能找到 keystore
        cat > renpy-sdk/rapt/prototype/local.properties << EOF
key.store=$GITHUB_WORKSPACE/renpy-sdk/rapt/prototype/debug.keystore
key.store.password=android
key.alias=android
key.alias.password=android
sdk.dir=$ANDROID_HOME
EOF

    - name: Build APK
      run: |
        cd renpy-sdk/rapt/prototype
        chmod +x gradlew
        export ANDROID_HOME=/usr/local/lib/android/sdk
        ./gradlew assembleRelease --no-daemon -x lintVitalAnalyzeRelease -x lintVitalReportRelease -x lintVitalRelease 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/rapt/prototype/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
