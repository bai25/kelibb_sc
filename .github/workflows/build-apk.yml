name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }
    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with: { python-version: '3.9' }
    - name: Install deps
      run: sudo apt-get install -y xvfb
    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with: { path: renpy-sdk, key: renpy-8.3.7-full }

    - name: Download SDK & RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        wget -q $BASE/renpy-8.3.7-rapt.zip
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk
        # RAPT zip 包含 rapt/ 目录，解压到 SDK 根目录
        cd renpy-sdk
        unzip -q -o ../renpy-8.3.7-rapt.zip -d . 2>/dev/null
        # 如果解压出 rapt/rapt/ 嵌套，拉平它
        if [ -d rapt/rapt ]; then
          cp -r rapt/rapt/* rapt/ 2>/dev/null
          cp -r rapt/rapt/.* rapt/ 2>/dev/null || true
        fi
        ls -la rapt/ | head -10
        find rapt -name "gradlew" -type f 2>/dev/null

    - name: Compile game
      run: xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile
    - name: Prepare assets
      run: python3 .github/workflows/prepare_rapt.py
    - name: Build APK
      run: |
        cd renpy-sdk
        GRADLEW=$(find . -name "gradlew" -type f 2>/dev/null | head -1)
        echo "Found gradlew: $GRADLEW"
        PROJECT_DIR=$(dirname "$GRADLEW")
        echo "Project: $PROJECT_DIR"
        chmod +x "$GRADLEW"
        cd "$PROJECT_DIR"
        ls -la
        ./gradlew assembleRelease --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/**/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
