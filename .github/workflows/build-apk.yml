name: Android CI
on:
  push: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with: { java-version: '21', distribution: 'temurin' }

    - name: Cache SDK
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-sdk
        key: renpy-8.3.7-full

    - name: Download SDK + RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk
        wget -q $BASE/renpy-8.3.7-rapt.zip
        unzip -q -o renpy-8.3.7-rapt.zip -d renpy-sdk
        if [ -d renpy-sdk/rapt/rapt ]; then
          cp -r renpy-sdk/rapt/rapt/* renpy-sdk/rapt/
        fi

    - name: Patch RAPT — dual architecture
      run: |
        sed -i "s/abiFilters 'arm64-v8a'/abiFilters 'arm64-v8a', 'armeabi-v7a'/" \
          renpy-sdk/rapt/templates/app-build.gradle

    - name: Setup project
      run: |
        mkdir -p renpy-sdk/projects
        ln -sf $GITHUB_WORKSPACE renpy-sdk/projects/goblin

    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore android.keystore \
          -alias android -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=CI, OU=Build, O=Goblin, L=Beijing, ST=Beijing, C=CN"

    - name: Build APK (official)
      run: |
        cd renpy-sdk
        xvfb-run -a ./renpy.sh launcher android_build "$GITHUB_WORKSPACE" 2>&1
        mkdir -p $GITHUB_WORKSPACE/apk-output
        cp rapt/bin/*.apk $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: apk-output/*.apk
        if-no-files-found: error
