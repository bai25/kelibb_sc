name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y xvfb p7zip-full

    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-sdk
        key: ${{ runner.os }}-renpy-8.3.2

    - name: Download Ren'Py SDK
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        wget -q https://www.renpy.org/dl/8.3.2/renpy-8.3.2-sdk.7z
        7z x renpy-8.3.2-sdk.7z -orenpy-sdk
        mv renpy-sdk/renpy-8.3.2-sdk/* renpy-sdk/
        rm -rf renpy-sdk/renpy-8.3.2-sdk

    - name: Compile game scripts
      run: |
        xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile

    - name: Prepare RAPT assets
      run: |
        python3 .github/workflows/prepare_rapt.py

    - name: Build APK with Gradle
      working-directory: ./renpy-sdk/rapt/project
      env:
        ANDROID_HOME: ${{ github.workspace }}/renpy-sdk/rapt/Sdk
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/rapt/project/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
