name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with: { java-version: '21', distribution: 'temurin' }

    - name: Cache Ren'Py SDK + RAPT
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-sdk
        key: renpy-8.3.7-rapt-v3

    - name: Download Ren'Py SDK + RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk
        wget -q $BASE/renpy-8.3.7-rapt.zip
        unzip -q -o renpy-8.3.7-rapt.zip -d renpy-sdk
        if [ -d renpy-sdk/rapt/rapt ]; then
          cp -r renpy-sdk/rapt/rapt/* renpy-sdk/rapt/
          rm -rf renpy-sdk/rapt/rapt
        fi

    - name: Patch RAPT template — dual architecture
      run: |
        TM=renpy-sdk/rapt/templates/app-build.gradle
        if [ -f "$TM" ]; then
          sed -i "s/abiFilters 'arm64-v8a'/abiFilters 'arm64-v8a', 'armeabi-v7a'/" "$TM"
          echo "Patched: $(grep abiFilters $TM)"
        fi

    - name: Compile game scripts
      run: |
        xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile 2>&1

    - name: Generate debug keystore
      run: |
        # android_build 需要 keystore，在项目根生成临时 debug key
        keytool -genkey -v -keystore $GITHUB_WORKSPACE/android.keystore \
          -alias android -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=CI, OU=Build, O=Goblin, L=Beijing, ST=Beijing, C=CN"
        echo "✅ Debug keystore created"
        # 同时写入 local.properties（android_build 会读取）
        cat > $GITHUB_WORKSPACE/local.properties << EOF
key.store=$GITHUB_WORKSPACE/android.keystore
key.store.password=android
key.alias=android
key.alias.password=android
EOF
        echo "✅ local.properties created"

    - name: Build APK — official Ren'Py android_build
      run: |
        cd renpy-sdk
        # 官方 android_build 接受绝对路径
        xvfb-run -a ./renpy.sh launcher android_build "$GITHUB_WORKSPACE" 2>&1
        # 收集构建产物
        mkdir -p $GITHUB_WORKSPACE/apk-output
        find . -name "*.apk" -type f -exec cp {} $GITHUB_WORKSPACE/apk-output/ \; 2>/dev/null || true
        echo "APKs found:"
        ls -lah $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || echo "(none)"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: apk-output/*.apk
        if-no-files-found: warn

    - name: Fallback — manual Gradle build
      if: failure()
      run: |
        cd renpy-sdk
        python3 $GITHUB_WORKSPACE/.github/workflows/prepare_rapt.py
        
        if [ -d rapt/project/app/src/main/assets ]; then
          rm -rf rapt/prototype/app/src/main/assets
          cp -r rapt/project/app/src/main/assets rapt/prototype/app/src/main/assets
        fi
        
        for dir in prototype project; do
          DST=renpy-sdk/rapt/$dir
          [ ! -d "$DST" ] && continue
          cp $GITHUB_WORKSPACE/android/build.gradle "$DST/"
          cp $GITHUB_WORKSPACE/android/settings.gradle "$DST/"
          cp $GITHUB_WORKSPACE/android/gradle.properties "$DST/" 2>/dev/null || true
          cp $GITHUB_WORKSPACE/android/gradlew "$DST/" 2>/dev/null || true
          mkdir -p "$DST/app"
          cp $GITHUB_WORKSPACE/android/app/build.gradle "$DST/app/"
          for mod in renpyandroid renpyiap; do
            cp -r $GITHUB_WORKSPACE/android/$mod/build.gradle "$DST/$mod/"
            cp -r $GITHUB_WORKSPACE/android/$mod/src "$DST/$mod/" 2>/dev/null || true
          done
          cp -r $GITHUB_WORKSPACE/android/app/src "$DST/app/" 2>/dev/null || true
        done
        
        cd rapt/prototype
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon -x lintVitalAnalyzeRelease -x lintVitalReportRelease -x lintVitalRelease 2>&1
        
        mkdir -p $GITHUB_WORKSPACE/apk-output
        cp app/build/outputs/apk/release/*.apk $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

    - name: Upload APK (fallback)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release-fallback
        path: apk-output/*.apk
        if-no-files-found: error
