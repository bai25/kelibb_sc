name: Android CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }

    - name: Cache Ren'Py SDK
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-sdk
        key: renpy-8.3.7-compile-v2

    - name: Download Ren'Py SDK
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        wget -q https://github.com/renpy/renpy/releases/download/8.3.7.25031702/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk renpy-sdk

    - name: Compile game scripts
      run: xvfb-run -a ./renpy-sdk/renpy.sh $GITHUB_WORKSPACE compile 2>&1

    - name: Prepare assets
      run: python3 $GITHUB_WORKSPACE/.github/workflows/prepare_rapt.py

    - name: Setup build files
      run: |
        # Copy Gradle config from repo to prototype
        P=renpy-sdk/rapt/prototype
        cp $GITHUB_WORKSPACE/android/build.gradle $P/
        cp $GITHUB_WORKSPACE/android/settings.gradle $P/
        cp $GITHUB_WORKSPACE/android/gradle.properties $P/
        cp $GITHUB_WORKSPACE/android/gradlew $P/
        cp $GITHUB_WORKSPACE/android/app/build.gradle $P/app/
        mkdir -p $P/app/src/main
        cp $GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml $P/app/src/main/

        for mod in renpyandroid renpyiap; do
          cp $GITHUB_WORKSPACE/android/$mod/build.gradle $P/$mod/
          cp -r $GITHUB_WORKSPACE/android/$mod/src $P/$mod/ 2>/dev/null || true
        done

        # Move assets from project -> prototype
        if [ -d renpy-sdk/rapt/project/app/src/main/assets ]; then
          rm -rf $P/app/src/main/assets
          cp -r renpy-sdk/rapt/project/app/src/main/assets $P/app/src/main/assets
        fi

    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore renpy-sdk/rapt/prototype/debug.keystore \
          -alias android -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=CI, OU=Build, O=Goblin, L=Beijing, ST=Beijing, C=CN"

    - name: Build APK
      run: |
        cd renpy-sdk/rapt/prototype
        chmod +x gradlew
        export ANDROID_HOME=/usr/local/lib/android/sdk
        ./gradlew assembleRelease --no-daemon -x lintVitalAnalyzeRelease -x lintVitalReportRelease -x lintVitalRelease 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: renpy-sdk/rapt/prototype/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
