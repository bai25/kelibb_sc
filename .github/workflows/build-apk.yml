name: Android CI
on:
  push: { branches: ["main"] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with: { java-version: '21', distribution: 'temurin' }

    - name: Cache SDK (outside workspace)
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: /opt/renpy-sdk
        key: renpy-8.3.7-sdk-v2

    - name: Download SDK + RAPT
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      run: |
        mkdir -p /opt/renpy-sdk
        cd /opt/renpy-sdk
        BASE=https://github.com/renpy/renpy/releases/download/8.3.7.25031702
        wget -q $BASE/renpy-8.3.7-sdk.tar.bz2
        tar -xjf renpy-8.3.7-sdk.tar.bz2
        mv renpy-8.3.7-sdk/* .
        rm -rf renpy-8.3.7-sdk renpy-8.3.7-sdk.tar.bz2
        wget -q $BASE/renpy-8.3.7-rapt.zip
        unzip -q -o renpy-8.3.7-rapt.zip
        rm -f renpy-8.3.7-rapt.zip
        if [ -d rapt/rapt ]; then
          cp -r rapt/rapt/* rapt/
          rm -rf rapt/rapt
        fi
        # Fix rapt/Sdk symlinks — 移除引起死循环的符号链接
        rm -rf rapt/Sdk 2>/dev/null || true

    - name: Patch RAPT — dual architecture
      run: |
        sed -i "s/abiFilters 'arm64-v8a'/abiFilters 'arm64-v8a', 'armeabi-v7a'/" \
          /opt/renpy-sdk/rapt/templates/app-build.gradle

    - name: Cache keystore (persistent signing)
      id: cache-key
      uses: actions/cache@v4
      with:
        path: $GITHUB_WORKSPACE/android.keystore
        key: goblin-keystore-v1

    - name: Generate keystore (first run only)
      if: steps.cache-key.outputs.cache-hit != 'true'
      run: |
        keytool -genkey -v -keystore $GITHUB_WORKSPACE/android.keystore \
          -alias release -keyalg RSA -keysize 2048 -validity 36500 \
          -storepass "Goblin2026!" -keypass "Goblin2026!" \
          -dname "CN=Kebiaoling, OU=GameDev, O=KebiaolingStudio, L=Beijing, ST=Beijing, C=CN"
        echo "✅ Fixed keystore generated (will be cached for future builds)"

    - name: Write local.properties for signing
      run: |
        echo "key.store=$GITHUB_WORKSPACE/android.keystore" > $GITHUB_WORKSPACE/local.properties
        echo "key.store.password=Goblin2026!" >> $GITHUB_WORKSPACE/local.properties
        echo "key.alias=release" >> $GITHUB_WORKSPACE/local.properties
        echo "key.alias.password=Goblin2026!" >> $GITHUB_WORKSPACE/local.properties
        echo "✅ local.properties written"

    - name: Point to system Android SDK
      run: |
        # 告诉 RAPT 使用系统预装的 Android SDK，避免 rapt/Sdk symlink 死循环
        echo "/usr/local/lib/android/sdk" > /opt/renpy-sdk/rapt/sdk.txt
        echo "SDK at: $(cat /opt/renpy-sdk/rapt/sdk.txt)"

    - name: Build APK (official)
      run: |
        cd /opt/renpy-sdk
        xvfb-run -a ./renpy.sh launcher android_build "$GITHUB_WORKSPACE" 2>&1
        mkdir -p $GITHUB_WORKSPACE/apk-output
        cp rapt/bin/*.apk $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: goblin-release
        path: apk-output/*.apk
        if-no-files-found: error
